# OpenKB configuration (generated by `okb init`, stored at .okb/config.yaml)

# LLM model — any LiteLLM-supported model
# Examples: gpt-5.4, gpt-4o, claude-sonnet-4-20250514, deepseek/deepseek-chat
model: gpt-5.4

# Environment variable name for the LLM API key
api_key_env: OPENAI_API_KEY

# Wiki output language
language: en

# PDF page threshold for PageIndex (PDFs with >= this many pages use PageIndex)
pageindex_threshold: 50

# PageIndex cloud API key env var (leave empty for local PageIndex)
# Set to PAGEINDEX_API_KEY to use PageIndex cloud service
pageindex_api_key_env: ""
